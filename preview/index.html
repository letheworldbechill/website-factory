<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Website Factory — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: "DM Mono", monospace; background: #0c0c0f; color: #e2e2e6; }

.shell {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 48px 1fr;
  height: 100vh;
}

/* ── Topbar ── */
.topbar {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 16px;
  padding: 0 16px;
  background: #111116;
  border-bottom: 1px solid #1e1e28;
  z-index: 20;
}
.topbar__logo { font-family: "Syne", sans-serif; font-size: 13px; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; color: #fff; white-space: nowrap; }
.topbar__logo span { color: #7c6af7; }
.topbar__sep  { width: 1px; height: 20px; background: #1e1e28; }
.topbar__status { font-size: 11px; color: #5a5a7a; margin-left: auto; padding: 3px 8px; border: 1px solid #1e1e28; border-radius: 4px; }
.topbar__status.ok  { color: #4ade80; border-color: rgba(74,222,128,.3); }
.topbar__status.err { color: #f87171; border-color: rgba(248,113,113,.3); }

/* ── Sidebar ── */
.sidebar {
  background: #111116;
  border-right: 1px solid #1e1e28;
  display: flex; flex-direction: column;
  overflow: hidden;            /* outer: no scroll */
}
.sidebar__scroll {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar__scroll::-webkit-scrollbar { width: 4px; }
.sidebar__scroll::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 2px; }

/* ── Sidebar footer (actions) — always visible ── */
/* BUG-I fix: actions outside scroll area, always at bottom */
.sidebar__footer {
  flex-shrink: 0;
  border-top: 1px solid #1e1e28;
  padding: 10px 16px 14px;
  display: flex; flex-direction: column; gap: 6px;
  background: #111116;
}
.shortcut-hint { font-size: 9px; color: #3a3a5a; text-align: center; padding-bottom: 6px; }
kbd { background: #1e1e28; border-radius: 2px; padding: 1px 4px; color: #5a5a7a; font-size: 9px; }

.sec-header { padding: 10px 16px 4px; font-size: 9px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: #3a3a5a; }
.ctrl { padding: 3px 16px 8px; display: flex; flex-direction: column; gap: 4px; }
.ctrl label { font-size: 10px; color: #5a5a7a; display: flex; justify-content: space-between; align-items: center; }

select, input[type=text], textarea {
  width: 100%; background: #0c0c0f; border: 1px solid #1e1e28; border-radius: 4px;
  color: #c0c0d8; font-family: "DM Mono", monospace; font-size: 11px;
  padding: 5px 8px; outline: none; transition: border-color .15s;
}
select:focus, input[type=text]:focus, textarea:focus { border-color: #7c6af7; box-shadow: 0 0 0 2px rgba(124,106,247,.15); }
select option { background: #111116; }
textarea { resize: vertical; min-height: 200px; font-size: 10px; line-height: 1.6; }

.chips { display: flex; flex-wrap: wrap; gap: 4px; padding: 3px 16px 8px; }
.chip { padding: 3px 8px; border-radius: 3px; font-size: 10px; border: 1px solid #1e1e28; background: #0c0c0f; color: #5a5a7a; cursor: pointer; transition: all .12s; white-space: nowrap; }
.chip:hover  { border-color: #7c6af7; color: #9090d0; }
.chip.active { background: #7c6af7; border-color: #7c6af7; color: #fff; }

.slider-row { display: flex; align-items: center; gap: 8px; padding: 3px 16px 8px; }
.slider-row label { font-size: 10px; color: #5a5a7a; width: 90px; white-space: nowrap; flex-shrink: 0; }
.slider-row input[type=range] { flex:1; -webkit-appearance:none; height:3px; background:#1e1e28; border-radius:2px; border:none; padding:0; }
.slider-row input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#7c6af7; border-radius:50%; cursor:pointer; box-shadow:0 0 0 2px rgba(124,106,247,.3); }
.slider-row .val { font-size: 10px; color: #9090b0; width: 28px; text-align: right; }

.color-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 3px 16px 8px; }
.color-item { display: flex; flex-direction: column; gap: 3px; }
.color-item label { font-size: 10px; color: #5a5a7a; }
.color-item input[type=color] { width:100%; height:28px; padding:2px 4px; background:#0c0c0f; border:1px solid #1e1e28; border-radius:4px; cursor:pointer; }

.mode-tabs { display: flex; padding: 10px 16px 0; }
.mode-tab { flex:1; padding:5px 0; font-size:10px; font-family:"DM Mono",monospace; text-align:center; border:1px solid #1e1e28; background:#0c0c0f; color:#5a5a7a; cursor:pointer; transition:all .12s; }
.mode-tab:first-child { border-radius: 4px 0 0 4px; }
.mode-tab:last-child  { border-radius: 0 4px 4px 0; border-left: none; }
.mode-tab.active { background: #1a1a2e; color: #9090d0; border-color: #7c6af7; }

/* BUG-J fix: error banner visible in both modes */
.error-banner { display:none; margin: 0 16px 8px; padding:8px 10px; background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.25); border-radius:4px; font-size:10px; color:#f87171; white-space:pre-wrap; word-break:break-all; }
.error-banner.show { display: block; }

.btn-compile { padding:8px 16px; background:#7c6af7; border:none; border-radius:4px; color:#fff; font-family:"DM Mono",monospace; font-size:11px; font-weight:500; cursor:pointer; transition:all .15s; letter-spacing:.04em; }
.btn-compile:hover  { background:#9482ff; transform:translateY(-1px); box-shadow:0 4px 12px rgba(124,106,247,.4); }
.btn-compile:active { transform:translateY(0); }
.btn-secondary { padding:6px 16px; background:transparent; border:1px solid #1e1e28; border-radius:4px; color:#5a5a7a; font-family:"DM Mono",monospace; font-size:10px; cursor:pointer; transition:all .12s; text-align:center; }
.btn-secondary:hover { border-color:#3a3a5a; color:#9090b0; }

/* ── Preview ── */
.preview-wrap {
  position: relative;
  display: flex; flex-direction: column;
  background: #0a0a0d;
  overflow: hidden;
  min-width: 0;       /* BUG-E fix: flex child doesn't overflow */
}

.preview-toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px;
  background: #0e0e14;
  border-bottom: 1px solid #1e1e28;
  flex-shrink: 0;
  z-index: 10;
}
.preview-toolbar__traffic { display:flex; gap:5px; }
.dot { width:10px; height:10px; border-radius:50%; }
.dot-r { background:#f87171; opacity:.6; } .dot-y { background:#fbbf24; opacity:.6; } .dot-g { background:#4ade80; opacity:.6; }
.preview-toolbar__viewport { display:flex; gap:2px; margin-left:auto; }
.vp-btn { padding:3px 8px; background:transparent; border:1px solid #1e1e28; border-radius:3px; color:#5a5a7a; font-size:10px; font-family:"DM Mono",monospace; cursor:pointer; transition:all .1s; }
.vp-btn.active, .vp-btn:hover { border-color:#7c6af7; color:#9090d0; }

/* BUG-B fix: iframe fills remaining height via flex, not hardcoded calc */
/* BUG-C fix: spinner layered above iframe with z-index */
.preview-frame-wrap {
  flex: 1;
  overflow: auto;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 16px;
  position: relative;          /* for spinner absolute positioning */
  background: repeating-linear-gradient(45deg, #0a0a0d 0px, #0a0a0d 10px, #0c0c10 10px, #0c0c10 20px);
}
.preview-frame-wrap::-webkit-scrollbar { width:6px; height:6px; }
.preview-frame-wrap::-webkit-scrollbar-thumb { background:#2a2a3a; border-radius:3px; }

iframe {
  border: none;
  border-radius: 6px;
  box-shadow: 0 0 0 1px #1e1e28, 0 20px 60px rgba(0,0,0,.5);
  background: #fff;
  /* BUG-B fix: height fills the frame-wrap */
  height: 100%;
  min-height: 600px;
  transition: width .3s cubic-bezier(.16,1,.3,1);
  flex-shrink: 0;
}

/* BUG-C fix: spinner above everything in the frame wrap */
.spinner {
  display: none;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 100;
  width: 28px; height: 28px;
  border: 2px solid #1e1e28;
  border-top-color: #7c6af7;
  border-radius: 50%;
  animation: spin .6s linear infinite;
  pointer-events: none;
}
.spinner.show { display: block; }
@keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
</style>

/**
 * engine/escape.js
 *
 * HTML-Escaping für alle user-generierten Inhalte.
 * Verhindert XSS-Angriffe durch injection in Templates.
 *
 * Regel: ALLE Werte aus DSL.data, DSL.items, DSL.site.name etc.
 *        müssen durch esc() laufen bevor sie in HTML-Attribute
 *        oder Text-Content eingefügt werden.
 */

const ESC_MAP = {
  "&":  "&amp;",
  "<":  "&lt;",
  ">":  "&gt;",
  '"':  "&quot;",
  "'":  "&#x27;",
  "/":  "&#x2F;",
  "`":  "&#x60;",
}

/**
 * Escaped einen String für sichere HTML-Ausgabe.
 * Gibt leeren String zurück wenn value null/undefined/falsy ist.
 *
 * @param {any}    value - Zu escapender Wert
 * @returns {string}     - Sicherer HTML-String
 */
export function esc(value) {
  if (value === null || value === undefined) return ""
  return String(value).replace(/[&<>"'`/]/g, c => ESC_MAP[c])
}

/**
 * Escaped einen URL-Wert für href/src-Attribute.
 * Blockt javascript:-URLs und data:- URLs.
 *
 * @param {string} url
 * @returns {string}
 */
export function escUrl(url) {
  if (!url) return "#"
  const s = String(url).trim()
  // javascript: und data: sind gefährlich
  if (/^(javascript|data|vbscript):/i.test(s)) return "#"
  return esc(s)
}

/**
 * engine/ids.js
 *
 * ID-Generierung für Sections.
 * Kein crypto-Modul nötig — läuft in Browser und Node.
 */

const CHARS = "abcdefghijklmnopqrstuvwxyz0123456789"

/**
 * Erzeugt eine kurze zufällige ID (4 Zeichen).
 * Format: "a1b2"
 */
function shortId(length = 4) {
  let id = ""
  for (let i = 0; i < length; i++) {
    id += CHARS[Math.floor(Math.random() * CHARS.length)]
  }
  return id
}

/**
 * Erzeugt eine Section-ID im Format "<type>-<shortid>".
 * Beispiel: "hero-a1b2", "services-x9y8"
 */
export function sectionId(type) {
  return `${type}-${shortId()}`
}

  testimonials: ["faq", "cta", "contact", "pricing"],
  faq:          ["cta", "contact"],
  pricing:      ["faq", "cta"],
  contact:      ["footer"],
  cta:          ["footer", "contact"],
  footer:       [],  // Endknoten
  custom:       [],  // Endknoten — custom kann überall stehen
}

/**
 * Prüft ob ein Übergang von source → target erlaubt ist.
 */
export function isValidTransition(source, target) {
  return GRAPH[source]?.includes(target) ?? false
}

/**
 * Prüft ob eine Section-Reihenfolge graph-konform ist.
 * Gibt ein Array der Verstösse zurück (leer = valide).
 *
 * @param {string[]} sequence - z.B. ["hero", "trust", "services", "cta", "footer"]
 * @returns {string[]}        - Verstösse
 */
export function validateSequence(sequence) {
  const violations = []

  for (let i = 0; i < sequence.length - 1; i++) {
    const from = sequence[i]
    const to   = sequence[i + 1]

    if (!(from in GRAPH)) {
      violations.push(`Unbekannter Section-Typ: '${from}'`)
      continue
    }

    // header und custom sind permissiv — dürfen überall stehen
    if (from === "header" || from === "custom" || to === "custom") continue

    if (!isValidTransition(from, to)) {
      violations.push(`Ungültiger Übergang: '${from}' → '${to}'`)
    }
  }

  return violations
}

/**
 * Gibt alle bekannten Section-Typen zurück.
 */
export function allSectionTypes() {
  return Object.keys(GRAPH)
}

/**
 * engine/parser.js
 *
 * Wandelt beliebig unvollständige Inputs in eine normierte, vollständige
 * DSL-Struktur um. Der Parser ist der einzige Ort, an dem Defaults gesetzt
 * und Kurzformen in Vollformen umgewandelt werden.
 *
 * Regel: Nach dem Parser ist die DSL immer vollständig und gültig.
 */

// ── Site-Defaults ─────────────────────────────────────────────────────────────

const SITE_DEFAULTS = {
  language:   "de-CH",
  pageType:   "landing",
  complexity: 5,
}

const THEME_DEFAULTS = {
  preset:       "swiss",
  density:      "balanced",
  spacingScale: 1.0,
}

// ── Haupt-Parser ──────────────────────────────────────────────────────────────

/**
 * Parst einen beliebigen Input in eine vollständige DSL.
 *
 * @param {object} input - Rohe Eingabe (kann unvollständig sein)
 * @returns {object}     - Vollständige, normierte DSL
 */
export function parse(input) {
  if (!input || typeof input !== "object") {
    throw new Error("Parser: Input muss ein Objekt sein")
  }

  return {
    version: "1.0",
    site:    parseSite(input.site || input),
    theme:   parseTheme(input.theme || {}),
    pages:   parsePages(input.pages || [], input.site || input),
    seo:     parseSeo(input.seo || {}, input.site || input),
    tracking: input.tracking || {},
    legal:   parseLegal(input.legal || {}, input.site || input),
    assets:  input.assets || {},
  }
}

// ── Site ──────────────────────────────────────────────────────────────────────

function parseSite(raw) {
  if (!raw.name)     throw new Error("Parser: site.name ist Pflichtfeld")
  if (!raw.industry) throw new Error("Parser: site.industry ist Pflichtfeld")

  return {
    name:       raw.name,
    language:   raw.language   || SITE_DEFAULTS.language,
    industry:   raw.industry,
    pageType:   raw.pageType   || SITE_DEFAULTS.pageType,
    complexity: raw.complexity || SITE_DEFAULTS.complexity,
    domain:     raw.domain     || "",
    tagline:    raw.tagline    || "",
    contact:    parseContact(raw.contact || {}),
  }
}

function parseContact(raw) {
  return {
    email:   raw.email   || "",
    phone:   raw.phone   || "",
    address: raw.address || "",
    city:    raw.city    || "",
    zip:     raw.zip     || "",
    country: raw.country || "CH",
  }
}

// ── Theme ─────────────────────────────────────────────────────────────────────

function parseTheme(raw) {
  return {
    preset:       raw.preset       || THEME_DEFAULTS.preset,
    density:      raw.density      || THEME_DEFAULTS.density,
    spacingScale: raw.spacingScale || THEME_DEFAULTS.spacingScale,
    brand:        raw.brand        || {},
    font:         raw.font         || {},
    radius:       raw.radius       || "default",
    motion:       raw.motion       || "default",
  }
}

// ── Pages ─────────────────────────────────────────────────────────────────────

function parsePages(rawPages, site) {
  // Keine Pages angegeben → eine Standardseite erzeugen
  if (!rawPages || rawPages.length === 0) {
    return [parsePage({ id: "home", kind: site.pageType || "landing" }, 0)]
  }
  return rawPages.map((raw, idx) => parsePage(raw, idx))
}

function parsePage(raw, idx = 0) {
  // BUG-6 Fix: Fehlende id bekommt einen Index-basierten Fallback
  const id = raw.id || (idx === 0 ? "home" : `page-${idx + 1}`)
  return {
    id,
    kind:        raw.kind || "landing",
    title:       raw.title || "",
    description: raw.description || "",
    slug:        raw.slug || (id === "home" ? "/" : `/${id}`),
    nav:         raw.nav || {},
    sections:    (raw.sections || []).map(parseSection),
  }
}

// ── Sections ──────────────────────────────────────────────────────────────────

function parseSection(raw) {
  const type = raw.type || "custom"

  return {
    id:       raw.id       || sectionId(type),
    type,
    enabled:  raw.enabled  !== undefined ? raw.enabled : true,
    areas:    raw.areas    || DEFAULT_AREAS[type] || { content: 1 },
    pattern:  raw.pattern  || undefined,       // undefined = Pattern Selector entscheidet
    data:     mergeData(DEFAULT_DATA[type] || {}, raw.data || {}),
    items:    (raw.items || []).map(parseItem),
    settings: mergeSettings(DEFAULT_SETTINGS[type] || {}, raw.settings || {}),
  }
}

function mergeData(defaults, overrides) {
  return { ...defaults, ...overrides }
}

function mergeSettings(defaults, overrides) {
  return { ...defaults, ...overrides }
}

function parseItem(raw) {
  // Items sind intentionell flexibel — nur id wird garantiert
  return {
    id: raw.id || sectionId("item"),
    ...raw,
  }
}

// ── SEO ───────────────────────────────────────────────────────────────────────

function parseSeo(raw, site) {
  const name = site.name || ""
  return {
    titleTemplate:      raw.titleTemplate      || `%s | ${name}`,
    defaultDescription: raw.defaultDescription || site.tagline || "",
    ogImage:            raw.ogImage            || "",
    canonical:          raw.canonical          || (site.domain ? `https://${site.domain}` : ""),
    locale:             raw.locale             || "de_CH",
    robots:             raw.robots             || "index, follow",
  }
}

// ── Legal ─────────────────────────────────────────────────────────────────────

function parseLegal(raw, site) {
  return {
    cookieBanner:    raw.cookieBanner   || false,
    imprintUrl:      raw.imprintUrl     || "",
    privacyUrl:      raw.privacyUrl     || "",
    agbUrl:          raw.agbUrl         || "",
    companyName:     raw.companyName    || site.name || "",
    companyAddress:  raw.companyAddress || [site.contact?.address, site.contact?.city].filter(Boolean).join(", "),
    vatId:           raw.vatId          || "",
  }
}

/**
 * engine/pageComposer.js
 *
 * Bestimmt welche Section-Typen eine Seite enthält.
 * Basiert auf pageType × industry × complexity.
 *
 * Gibt eine geordnete Liste von Section-Typ-Strings zurück —
 * der Section Composer baut daraus konkrete Section-Objekte.
 */

// ── Page Type Basis-Mengen ────────────────────────────────────────────────────

const PAGE_TYPES = {
  landing:   ["hero", "services", "cta", "footer"],
  sales:     ["hero", "benefits", "testimonials", "faq", "cta", "footer"],
  company:   ["hero", "services", "team", "contact", "footer"],
  portfolio: ["hero", "gallery", "testimonials", "contact", "footer"],
  onepage:   ["hero", "services", "process", "testimonials", "cta", "footer"],
}

// ── Industry Extensions ───────────────────────────────────────────────────────

const INDUSTRY_EXTENSIONS = {
  treuhand:    ["trust", "process", "faq"],
  kanzlei:     ["authority", "faq"],
  it:          ["benefits", "testimonials"],
  saas:        ["authority", "pricing", "faq"],
  restaurant:  ["gallery", "testimonials"],
  handwerk:    ["trust", "process", "gallery"],
  immobilien:  ["gallery", "testimonials"],
  medizin:     ["trust", "team", "faq"],
  coaching:    ["authority", "process", "testimonials"],
  bildung:     ["process", "team", "faq"],
  generic:     [],
}

// ── Complexity Map (Fibonacci) ────────────────────────────────────────────────

const COMPLEXITY = {
  1: ["hero", "cta", "footer"],
  3: ["hero", "services", "cta", "footer"],
  5: ["hero", "trust", "services", "testimonials", "cta", "footer"],
  8: ["hero", "trust", "authority", "services", "process", "testimonials", "faq", "cta", "footer"],
}

// ── Reihenfolge ───────────────────────────────────────────────────────────────

// Kanonische Reihenfolge aller Section-Typen.
// Wird genutzt um die gemergte Menge zu sortieren.
const CANONICAL_ORDER = [
  "header",
  "hero",
  "trust",
  "authority",
  "services",
  "benefits",
  "process",
  "team",
  "gallery",
  "testimonials",
  "pricing",   // nach testimonials, vor faq — korrekte Sales-Reihenfolge
  "faq",
  "contact",
  "cta",
  "footer",
]

// ── Composer ──────────────────────────────────────────────────────────────────

/**
 * Gibt eine geordnete Liste von Section-Typ-Strings zurück.
 *
 * @param {object} site - site-Objekt aus der DSL (nach dem Parser)
 * @returns {string[]}  - z.B. ["hero", "trust", "services", "faq", "cta", "footer"]
 */
export function composePage(site) {
  const base       = COMPLEXITY[site.complexity] || COMPLEXITY[5]
  const extensions = INDUSTRY_EXTENSIONS[site.industry] || []

  // Merged Set: alle Typen aus Complexity + Industry Extensions
  const merged = new Set(base)
  extensions.forEach(s => merged.add(s))

  // Sortieren nach kanonischer Reihenfolge
  const sorted = CANONICAL_ORDER.filter(type => merged.has(type))

  // Graph-Validierung (Warnungen, keine Fehler — Reihenfolge ist bereits kanonisch)
  const violations = validateSequence(sorted)
  if (violations.length > 0) {
    console.warn("pageComposer: Graph-Verstösse in generierter Reihenfolge:", violations)
  }

  return sorted
}

/**
 * Gibt die Basis-Sections für einen pageType zurück (ohne industry/complexity).
 * Nützlich für Tests und Previews.
 */
export function basePageSections(pageType) {
  return PAGE_TYPES[pageType] || PAGE_TYPES.landing
}

/**
 * Gibt die Industry-Extensions für eine Branche zurück.
 */
export function industryExtensions(industry) {
  return INDUSTRY_EXTENSIONS[industry] || []
}

/**
 * engine/sectionComposer.js
 *
 * Erzeugt aus einer Liste von Section-Typ-Strings vollständige Section-Objekte.
 * Jede Section bekommt ID, areas, data, items und settings aus den Defaults.
 */

/**
 * Erzeugt Section-Objekte aus einer Liste von Typ-Strings.
 *
 * @param {string[]} sectionTypes - z.B. ["hero", "trust", "services", "cta", "footer"]
 * @returns {object[]}            - Vollständige Section-Objekte
 */
export function composeSections(sectionTypes) {
  return sectionTypes.map(type => ({
    id:       sectionId(type),
    type,
    enabled:  true,
    areas:    { ...(DEFAULT_AREAS[type]    || { content: 1 }) },
    pattern:  undefined,
    data:     { ...(DEFAULT_DATA[type]     || {}) },
    items:    [],
    settings: { ...(DEFAULT_SETTINGS[type] || { background: "default", paddingTop: "lg", paddingBottom: "lg" }) },
  }))
}

/**
 * Erzeugt eine einzelne Section für einen Typ.
 * Nützlich wenn der Page Composer eine neue Section zu einer bestehenden Page hinzufügt.
 */
export function composeSection(type) {
  return composeSections([type])[0]
}

/**
 * engine/patternSelector.js
 *
 * Wählt das UI-Pattern für eine Section.
 * Reihenfolge: expliziter Override → fester Typ → Item-Anzahl-Regel.
 */

// Section-Typen mit festem Pattern (unabhängig von Item-Anzahl)
const FIXED_PATTERNS = {
  header:       "header",
  hero:         "hero",
  trust:        "trust",
  authority:    "text",
  process:      "process",
  faq:          "faq",
  cta:          "cta",
  footer:       "footer",
  contact:      "contact",
  gallery:      "gallery",
  testimonials: "testimonials",
}

// Section-Typen die item-basiert ihr Pattern wählen
// (kein Eintrag in FIXED_PATTERNS → fällt durch zur Item-Anzahl-Regel)
// services, benefits, pricing, team, custom → je nach items: text | cards | grid | list

/**
 * Gibt das Pattern für eine Section zurück.
 *
 * @param {object} section - Section-Objekt (muss type und optional items haben)
 * @returns {string}       - Pattern-Bezeichner
 */
export function selectPattern(section) {
  // 1. Expliziter Override in der DSL
  if (section.pattern) return section.pattern

  // 2. Fester Typ
  if (FIXED_PATTERNS[section.type]) return FIXED_PATTERNS[section.type]

  // 3. Item-Anzahl-Regel
  const count = section.items?.length || 0

  // BUG-8 Fix: Sections wie services/benefits/pricing/team erwarten eine Card-Struktur
  // auch wenn noch keine Items befüllt sind (Skeleton-Rendering). 'text' wäre irreführend.
  const isItemSection = ["services", "benefits", "pricing", "team"].includes(section.type)
  if (count === 0) return isItemSection ? "cards" : "text"
  if (count === 2) return "split"
  if (count <= 4) return "cards"
  if (count <= 8) return "grid"
  return "list"
}

/**
 * engine/layoutComposer.js
 *
 * Erzeugt aus den Fibonacci-areas einer Section ein Layout-Objekt.
 * Das Layout-Objekt wird von den Pattern-Renderern in CSS umgewandelt.
 */

// Anzahl Spalten → Layout-Typ
const LAYOUT_TYPES = {
  1: "stack",
  2: "split",
  3: "triple",
}

/**
 * Erzeugt ein Layout-Objekt aus den areas einer Section.
 *
 * @param {object} section - Section mit areas-Objekt
 * @returns {object}       - Layout-Beschreibung
 */
export function composeLayout(section) {
  const areas   = section.areas || { content: 1 }
  const keys    = Object.keys(areas)
  const values  = Object.values(areas)
  const columns = values.map(v => `${v}fr`).join(" ")
  const count   = keys.length

  return {
    display:    "grid",
    columns,
    type:       LAYOUT_TYPES[count] || "grid",
    areaNames:  keys,
    areaValues: values,
    // Inline-Style-String für direkte Nutzung im HTML
    style:      `display:grid;grid-template-columns:${columns};gap:var(--sp-8)`,
  }
}

/**
 * Gibt einen responsiven Wrapper-Style zurück.
 * Auf Mobile kollabiert jedes Grid zu einer Spalte.
 *
 * @param {object} layout - Ergebnis von composeLayout()
 * @returns {string}      - CSS-Klassen-String
 */
export function layoutClass(layout) {
  const map = {
    stack:  "layout-stack",
    split:  "layout-split",
    triple: "layout-triple",
    grid:   "layout-grid",
  }
  return map[layout.type] || "layout-grid"
}

function stars(rating) {
  const n = Math.min(Math.max(Number(rating) || 5, 1), 5)
  return "★".repeat(n) + "☆".repeat(5 - n)
}

  const cols  = items.length === 0 ? 3 : Math.min(items.length, 3)

  return `<section class="section section--testimonials bg--${bg} section--pt-${pt} section--pb-${pb}" id="${esc(section.id)}">

  const ptClass = `section--pt-${esc(section.settings?.paddingTop  || "xl")}`
  const pbClass = `section--pb-${esc(section.settings?.paddingBottom || "xl")}`

  return `<section class="section section--hero bg--${bg} ${ptClass} ${pbClass}" id="${esc(section.id)}">
  <div class="container">
    <div class="${hasCols ? "layout-split" : "layout-stack"}"${hasCols ? ` style="${esc(layout.style)}"` : ""}>
      <div class="hero__content">
        ${d.label    ? `<p class="eyebrow">${esc(d.label)}</p>` : ""}
        <h1 class="hero__title">${esc(d.title)}</h1>
        ${d.subtitle ? `<p class="hero__subtitle">${esc(d.subtitle)}</p>` : ""}
        ${(d.ctaPrimary || d.ctaSecondary) ? `
        <div class="btn-group">
          ${d.ctaPrimary   ? `<a href="${escUrl(d.ctaPrimaryUrl)}"   class="btn btn--primary">${esc(d.ctaPrimary)}</a>`   : ""}
          ${d.ctaSecondary ? `<a href="${escUrl(d.ctaSecondaryUrl)}" class="btn btn--secondary">${esc(d.ctaSecondary)}</a>` : ""}
        </div>` : ""}
      </div>
      ${hasCols && d.image ? `<div class="hero__image"><img src="${escUrl(d.image)}" alt="${esc(d.imageAlt || d.title)}" loading="eager"></div>` : ""}
    </div>
  </div>
</section>`
}

/**
 * patterns/text.js
 */

export function renderText(section, layout) {
  const d  = section.data || {}
  const bg = esc(section.settings?.background || "default")
  const pt = esc(section.settings?.paddingTop    || "lg")
  const pb = esc(section.settings?.paddingBottom || "lg")

  return `<section class="section section--text bg--${bg} section--pt-${pt} section--pb-${pb}" id="${esc(section.id)}">
  <div class="container">
    ${d.label    ? `<p class="eyebrow">${esc(d.label)}</p>`                     : ""}
    ${d.title    ? `<h2 class="section__title">${esc(d.title)}</h2>`            : ""}
    ${d.subtitle ? `<p class="section__subtitle">${esc(d.subtitle)}</p>`        : ""}
    ${d.body     ? `<div class="prose">${esc(d.body)}</div>`                    : ""}
  </div>
</section>`
}

/**
 * patterns/cards.js — 2–4 Items als Karten
 */

export function renderCards(section, layout) {
  const d     = section.data  || {}
  const items = section.items || []
  const bg    = esc(section.settings?.background || "default")
  const pt    = esc(section.settings?.paddingTop    || "lg")
  const pb    = esc(section.settings?.paddingBottom || "lg")

  // BUG-4 Fix: mindestens 1 Spalte, auch bei 0 items
  const cols  = items.length === 0 ? 3 : items.length === 2 ? 2 : Math.min(items.length, 3)

  return `<section class="section section--cards bg--${bg} section--pt-${pt} section--pb-${pb}" id="${esc(section.id)}">
  <div class="container">
    ${d.label    ? `<p class="eyebrow">${esc(d.label)}</p>`              : ""}
    ${d.title    ? `<h2 class="section__title">${esc(d.title)}</h2>`     : ""}
    ${d.subtitle ? `<p class="section__subtitle">${esc(d.subtitle)}</p>` : ""}
    ${items.length > 0 ? `<div class="card-grid card-grid--${cols}">
      ${items.map(item => `
      <div class="card">
        ${item.icon  ? `<div class="card__icon">${esc(item.icon)}</div>` : ""}
        ${item.image ? `<img class="card__image" src="${escUrl(item.image)}" alt="${esc(item.imageAlt || item.title)}">` : ""}
        ${item.title ? `<h3 class="card__title">${esc(item.title)}</h3>` : ""}
        ${item.body  ? `<p class="card__body">${esc(item.body)}</p>`     : ""}
        ${item.url   ? `<a href="${escUrl(item.url)}" class="card__link">${esc(item.label || "Mehr erfahren")}</a>` : ""}
      </div>`).join("")}
    </div>` : ""}
  </div>
</section>`
}

/**
 * engine/validator.js
 *
 * Semantischer Validator — prüft die DSL nach dem Parser.
 * Ergänzt den Schema-Validator (schema/validate.js) um Laufzeit-Checks:
 * - Sind Section-IDs innerhalb einer Page eindeutig?
 * - Sind Page-IDs eindeutig?
 * - Ist die Section-Reihenfolge graph-konform?
 * - Gibt es leere required-Felder in kritischen Sections?
 */

const VALID_SECTION_TYPES = new Set([
  "header", "hero", "trust", "authority", "services", "benefits",
  "process", "team", "gallery", "testimonials", "faq", "cta",
  "footer", "contact", "pricing", "custom",
])

/**
 * Validiert eine vollständige DSL (nach parse()).
 * Gibt { valid: boolean, errors: string[], warnings: string[] } zurück.
 *
 * @param {object} dsl - Geparste DSL
 */
export function validateDSL(dsl) {
  const errors   = []
  const warnings = []

  // ── Top-Level ───────────────────────────────────────────────────────────────
  if (!dsl.site)  errors.push("site fehlt")
  if (!dsl.theme) errors.push("theme fehlt")
  if (!dsl.pages || dsl.pages.length === 0) errors.push("pages ist leer")

  if (errors.length > 0) return { valid: false, errors, warnings }

  // ── Site ────────────────────────────────────────────────────────────────────
  if (!dsl.site.name)     errors.push("site.name fehlt")
  if (!dsl.site.industry) errors.push("site.industry fehlt")

  // ── Pages ───────────────────────────────────────────────────────────────────
  const pageIds = new Set()
  for (const page of dsl.pages) {
    if (!page.id) {
      errors.push("Page ohne id")
      continue
    }
    if (pageIds.has(page.id)) {
      errors.push(`Doppelte Page-ID: '${page.id}'`)
    }
    pageIds.add(page.id)

    // ── Sections ──────────────────────────────────────────────────────────────
    const sectionIds = new Set()
    const enabledTypes = []

    for (const section of page.sections || []) {
      // ID-Eindeutigkeit
      if (!section.id) {
        errors.push(`Page '${page.id}': Section ohne id`)
        continue
      }
      if (sectionIds.has(section.id)) {
        errors.push(`Page '${page.id}': Doppelte Section-ID '${section.id}'`)
      }
      sectionIds.add(section.id)

      // Typ
      if (!VALID_SECTION_TYPES.has(section.type)) {
        errors.push(`Page '${page.id}', Section '${section.id}': Unbekannter Typ '${section.type}'`)
      }

      // Nur enabled Sections in die Graph-Prüfung
      if (section.enabled !== false) {
        enabledTypes.push(section.type)
      }

      // Hero braucht mindestens einen Titel
      if (section.type === "hero" && !section.data?.title) {
        warnings.push(`Section '${section.id}': hero.data.title ist leer`)
      }

      // CTA braucht ctaPrimary
      if (section.type === "cta" && !section.data?.ctaPrimary) {
        warnings.push(`Section '${section.id}': cta.data.ctaPrimary ist leer`)
      }
    }

    // Graph-Reihenfolge prüfen (nur Warnungen, kein harter Fehler)
    const violations = validateSequence(enabledTypes)
    for (const v of violations) {
      warnings.push(`Page '${page.id}': ${v}`)
    }
  }

  return {
    valid:    errors.length === 0,
    errors,
    warnings,
  }
}

/**
 * engine/renderer.js
 *
 * Verbindet Pattern Selector, Layout Composer und Pattern-Renderer.
 * Gibt für eine Section den fertigen HTML-String zurück.
 */

// Pattern → Render-Funktion
const RENDER_MAP = {
  hero:         renderHero,
  text:         renderText,
  cards:        renderCards,
  faq:          renderFaq,
  cta:          renderCta,
  trust:        renderTrust,
  process:      renderProcess,
  testimonials: renderTestimonials,
  footer:       renderFooter,
  // Aliase
  split:        renderCards,
  grid:         renderCards,
  list:         renderText,
  gallery:      renderCards,
  contact:      renderText,
  header:       renderText,
}

/**
 * Rendert eine einzelne Section zu HTML.
 *
 * @param {object} section - Section-Objekt
 * @param {object} config  - Vollständige DSL (für footer: legal, site)
 * @returns {string}       - HTML-String
 */
export function renderSection(section, config = {}) {
  if (section.enabled === false) return ""

  const pattern = selectPattern(section)
  const layout  = composeLayout(section)
  const fn      = RENDER_MAP[pattern]

  if (!fn) {
    console.warn(`renderer: Kein Renderer für Pattern '${pattern}' (Section '${section.id}')`)
    return `<!-- section ${esc(section.id)} (${esc(section.type)}): kein Renderer -->`
  }

  return fn(section, layout, config)
}

// ── Density → Spacing Multiplikator ──────────────────────────────────────────

const DENSITY_SCALE = { compact: 0.8, balanced: 1.0, airy: 1.2 }

// ── Radius-Map ────────────────────────────────────────────────────────────────

const RADIUS_MAP = {
  none:    { sm: "0",    md: "0",    lg: "0",    pill: "0"     },
  subtle:  { sm: "2px",  md: "4px",  lg: "6px",  pill: "999px" },
  default: { sm: "4px",  md: "8px",  lg: "12px", pill: "999px" },
  round:   { sm: "8px",  md: "16px", lg: "24px", pill: "999px" },
  pill:    { sm: "999px",md: "999px",lg: "999px", pill: "999px" },
}

// ── Compiler ──────────────────────────────────────────────────────────────────

/**
 * Erzeugt einen vollständigen CSS-:root-Block aus dem Theme-Objekt.
 *
 * @param {object} theme - Theme nach parse()
 * @returns {string}     - CSS-String
 */
export function compileTheme(theme) {
  const base    = PRESETS[theme.preset] || PRESETS.swiss
  const density = DENSITY_SCALE[theme.density] || 1.0
  const scale   = (theme.spacingScale || 1.0) * density
  const radii   = RADIUS_MAP[theme.radius || "default"]

  // Brand-Overrides anwenden
  const colors = {
    primary:   theme.brand?.primary  || base.primary,
    accent:    theme.brand?.accent   || base.accent,
    bg:        theme.brand?.bg       || base.bg,
    bgAlt:     base.bgAlt,
    surface:   base.surface,
    text:      theme.brand?.text     || base.text,
    textLight: base.textLight,
    textMuted: base.textMuted,
    border:    base.border,
  }

  // Font-Overrides anwenden
  const fonts = {
    display: theme.font?.display ? `${theme.font.display}, system-ui, sans-serif` : base.fontDisplay,
    body:    theme.font?.body    ? `${theme.font.body}, system-ui, sans-serif`    : base.fontBody,
    mono:    theme.font?.mono    || "ui-monospace, SFMono-Regular, Menlo, monospace",
  }

  // Spacing-Skala (4px-Grid × scale)
  const sp = (n) => `${Math.round(n * scale)}px`

  return `:root {
  /* Colors */
  --c-primary:    ${colors.primary};
  --c-accent:     ${colors.accent};
  --c-bg:         ${colors.bg};
  --c-bg-alt:     ${colors.bgAlt};
  --c-surface:    ${colors.surface};
  --c-text:       ${colors.text};
  --c-text-light: ${colors.textLight};
  --c-text-muted: ${colors.textMuted};
  --c-border:     ${colors.border};

  /* Typography */
  --font-display: ${fonts.display};
  --font-body:    ${fonts.body};
  --font-mono:    ${fonts.mono};

  --fs-xs:   11px;
  --fs-sm:   13px;
  --fs-base: 15px;
  --fs-lg:   17px;
  --fs-xl:   20px;
  --fs-2xl:  24px;
  --fs-3xl:  32px;
  --fs-4xl:  40px;

  --lh-tight:   1.2;
  --lh-normal:  1.5;
  --lh-relaxed: 1.7;

  --tracking-tight:  -0.02em;
  --tracking-normal:  0;
  --tracking-wide:    0.08em;

  /* Spacing (4px-Grid × ${scale.toFixed(2)}) */
  --sp-1:  ${sp(4)};
  --sp-2:  ${sp(8)};
  --sp-3:  ${sp(12)};
  --sp-4:  ${sp(16)};
  --sp-5:  ${sp(20)};
  --sp-6:  ${sp(24)};
  --sp-8:  ${sp(32)};
  --sp-10: ${sp(40)};
  --sp-12: ${sp(48)};
  --sp-16: ${sp(64)};

  /* Section Padding */
  --pt-none: 0;
  --pt-sm:   ${sp(24)};
  --pt-md:   ${sp(40)};
  --pt-lg:   ${sp(64)};
  --pt-xl:   ${sp(96)};

  /* Radius */
  --r-sm:   ${radii.sm};
  --r-md:   ${radii.md};
  --r-lg:   ${radii.lg};
  --r-pill: ${radii.pill};

  /* Shadows */
  --sh-soft:    0 4px 12px rgba(0,0,0,0.06);
  --sh-medium:  0 8px 24px rgba(0,0,0,0.10);
  --sh-deep:    0 18px 45px rgba(0,0,0,0.16);

  /* Transitions */
  --ease-out:       cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast:  150ms;
  --duration-norm:  220ms;

  /* Layout */
  --page-max:  1120px;
  --container: min(var(--page-max), 100% - var(--sp-8) * 2);
}

/* Background utilities */
.bg--default     { background: var(--c-bg); }
.bg--alt         { background: var(--c-bg-alt); }
.bg--brand       { background: var(--c-primary); color: #fff; }

.footer__legal a { font-size: var(--fs-sm); opacity: .75; text-decoration: none; }
.footer__legal a:hover { opacity: 1; }
.footer__copy    { font-size: var(--fs-xs); opacity: .5; border-top: 1px solid rgba(255,255,255,.1); padding-top: var(--sp-4); }

/* Prose */
.prose { line-height: var(--lh-relaxed); color: var(--c-text-light); max-width: 720px; }

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/**
 * engine/compiler.js
 *
 * Haupteinstieg der Factory.
 * DSL → vollständiges HTML-Dokument.
 *
 * Ablauf:
 *   1. parse()     → normierte DSL
 *   2. validateDSL → Fehler/Warnungen
 *   3. composePage → Section-Typen
 *   4. sections übernehmen (aus DSL) oder composeSections (auto)
 *   5. renderSection pro Section
 *   6. compileTheme → CSS
 *   7. HTML-Dokument zusammenbauen
 */

/**
 * Kompiliert eine DSL (roh oder bereits geparst) zu einem HTML-String.
 *
 * @param {object}  input    - Rohe oder geparste DSL
 * @param {object}  [opts]
 * @param {boolean} [opts.strict=false] - Bei true: Fehler werfen statt Warning
 * @returns {string}         - Vollständiges HTML-Dokument
 */
export function compileSite(input, opts = {}) {
  // 1. Parse
  const config = parse(input)

  // 2. Validate
  const { valid, errors, warnings } = validateDSL(config)

  if (warnings.length > 0) {
    warnings.forEach(w => console.warn("compiler warning:", w))
  }
  if (!valid) {
    const msg = "compiler: DSL-Fehler:\n" + errors.map(e => `  • ${e}`).join("\n")
    if (opts.strict) throw new Error(msg)
    console.error(msg)
  }

  // 3. Seiten kompilieren (CSS wird intern in compilePage erzeugt)
  const pages = config.pages.map(page => compilePage(page, config))

  // Bei einer Seite direkt das HTML zurückgeben
  if (pages.length === 1) return pages[0]

  // Mehrere Seiten: Map { pageId → html }
  return Object.fromEntries(config.pages.map((p, i) => [p.id, pages[i]]))
}

// ── Interne Helfer ────────────────────────────────────────────────────────────

function compilePage(page, config) {
  // Sections: aus DSL übernehmen oder auto-generieren
  let sections = page.sections || []

  if (sections.length === 0) {
    const types = composePage(config.site)
    sections = composeSections(types)
  }

  const body = sections
    .map(section => renderSection(section, config))
    .join("\n")

  const meta = compileMeta(page, config)
  const css  = compileTheme(config.theme)
  const lang = esc(config.site.language || "de")

  return `<!DOCTYPE html>
<html lang="${lang}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
${meta}
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--font-body); background: var(--c-bg); color: var(--c-text); line-height: 1.5; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
img { max-width: 100%; display: block; }
${css}
</style>
</head>
<body>
${body}
</body>
</html>`
}

function compileMeta(page, config) {
  const seo  = config.seo  || {}
  const site = config.site || {}

  const rawTitle = page.title
    ? (seo.titleTemplate || "%s").replace("%s", page.title)
    : site.name || ""
  const title       = esc(rawTitle)
  const description = esc(page.description || seo.defaultDescription || "")
  const canonical   = seo.canonical
    ? esc(`${seo.canonical}${page.slug === "/" ? "" : page.slug}`)
    : ""
  const ogLocale    = esc(seo.locale || "de_CH")
  const robots      = esc(seo.robots || "index, follow")
  const ogImage     = esc(seo.ogImage || "")

  return [
    `<title>${title}</title>`,
    description ? `<meta name="description" content="${description}">` : "",
    `<meta name="robots" content="${robots}">`,
    canonical   ? `<link rel="canonical" href="${canonical}">` : "",
    `<meta property="og:title" content="${title}">`,
    description ? `<meta property="og:description" content="${description}">` : "",
    ogImage     ? `<meta property="og:image" content="${ogImage}">` : "",
    `<meta property="og:locale" content="${ogLocale}">`,
  ].filter(Boolean).join("\n")
}

window.setMode = function(mode) {

  document.querySelectorAll(".mode-tab").forEach(t => t.classList.toggle("active", t.dataset.mode === mode))
  document.getElementById("visualPanel").style.display = mode === "visual" ? "block" : "none"
  document.getElementById("dslPanel").style.display    = mode === "dsl"    ? "block" : "none"

  // BUG-H fix: only overwrite editor if not manually dirty
  if (mode === "dsl" && !dslDirty) {
    try {
      document.getElementById("dslEditor").value = JSON.stringify(buildDSLFromVisual(), null, 2)
    } catch(e) {}
  }
}

// BUILD DSL — BUG-F fix: pages auto-composed when industry/complexity change
// ════════════════════════════════════════════════
function buildDSLFromVisual() {
  const industry   = document.getElementById("industry").value
  const pageType   = document.getElementById("pageType").value
  const complexity = currentComplex

  // If industry or complexity differs from example, drop fixed sections
  // so compiler auto-composes them via composePage()
  const exampleIndustry = EXAMPLE_DSL.site.industry
  const exampleComplex  = EXAMPLE_DSL.site.complexity
  const sameConfig = (industry === exampleIndustry && complexity === exampleComplex && pageType === EXAMPLE_DSL.site.pageType)

  const pages = sameConfig
    ? EXAMPLE_DSL.pages                                    // keep example content
    : [{ id: "home", kind: pageType, title: document.getElementById("siteName").value || "Start" }]  // auto-compose

  return {
    ...EXAMPLE_DSL,
    site: {
      ...EXAMPLE_DSL.site,
      name:       document.getElementById("siteName").value || "Meine Website",
      industry,
      pageType,
      complexity,
    },
    theme: {
      preset:       currentPreset,
      density:      document.getElementById("density").value,
      spacingScale: parseFloat(document.getElementById("spacingScale").value),
      radius:       document.getElementById("radius").value,
      brand: {
        primary: document.getElementById("colorPrimary").value,
        accent:  document.getElementById("colorAccent").value,
        bg:      document.getElementById("colorBg").value,
        text:    document.getElementById("colorText").value,
      }
    },
    pages,
    legal: EXAMPLE_DSL.legal,
    seo:   { ...EXAMPLE_DSL.seo },
  }
}

window.syncFromVisual = function() {
  if (currentMode === "dsl" && !dslDirty) {
    try {
      document.getElementById("dslEditor").value = JSON.stringify(buildDSLFromVisual(), null, 2)
    } catch(e) {}
  }
  clearTimeout(window._compileTimer)
  window._compileTimer = setTimeout(compile, 150)
}

// ════════════════════════════════════════════════
// COMPILE — BUG-J fix: errors shown in both modes
// ════════════════════════════════════════════════
window.compile = function() {
  const spinner = document.getElementById("spinner")
  const badge   = document.getElementById("statusBadge")
  const errEl   = document.getElementById("errorBanner")

  spinner.classList.add("show")
  errEl.classList.remove("show")

  try {
    let dsl
    if (currentMode === "dsl") {
      dsl = JSON.parse(document.getElementById("dslEditor").value)
    } else {
      dsl = buildDSLFromVisual()
    }
    lastDSL = dsl

    const t0   = performance.now()
    const html = compileSite(dsl)
    const ms   = (performance.now() - t0).toFixed(0)
    lastHTML   = html

    const frame = document.getElementById("previewFrame")
    const doc   = frame.contentDocument || frame.contentWindow.document
    doc.open(); doc.write(html); doc.close()

    const domain = dsl.site?.domain
      || (dsl.site?.name || "preview").toLowerCase().replace(/\s+/g, "-") + ".ch"
    document.getElementById("previewUrl").textContent = "https://" + domain

    badge.textContent = ms + "ms"
    badge.className   = "topbar__status ok"

  } catch(err) {
    badge.textContent = "Fehler"
    badge.className   = "topbar__status err"
    // BUG-J fix: show error in both modes
    errEl.textContent = err.message
    errEl.classList.add("show")
    console.error("compile:", err)
  } finally {
    spinner.classList.remove("show")
  }
}

// ════════════════════════════════════════════════
// EXPORT — BUG-G fix: filename from site name/domain
// ════════════════════════════════════════════════
window.downloadHTML = function() {
  if (!lastHTML) return
  const siteName = lastDSL?.site?.domain
    || (lastDSL?.site?.name || "website").toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-]/g, "")
  const filename = siteName.endsWith(".ch") || siteName.endsWith(".com") ? siteName : siteName + ".html"
  const blob = new Blob([lastHTML], { type: "text/html" })
  const a    = Object.assign(document.createElement("a"), {
    href: URL.createObjectURL(blob), download: filename
  })
  a.click()
  URL.revokeObjectURL(a.href)
}

// BUG-A fix: btn passed explicitly, no event global
window.copyDSL = function(btn) {
  let dsl
  try {
    dsl = currentMode === "dsl"
      ? document.getElementById("dslEditor").value
      : JSON.stringify(buildDSLFromVisual(), null, 2)
  } catch(e) { return }
  navigator.clipboard.writeText(dsl).then(() => {
    const old = btn.textContent
    btn.textContent = "✓ Kopiert"
    setTimeout(() => btn.textContent = old, 1200)
  })
}
